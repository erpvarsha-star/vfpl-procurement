<!DOCTYPE html>
<html>
<head>
  <title>VFPL PR System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>VFPL PR System</h2>

<!-- LOGIN -->
<h3>Login</h3>
<input id="pin" placeholder="Enter PIN">
<button onclick="login()">Login</button>

<hr>

<!-- PR FORM -->
<h3>Create PR</h3>

<input id="plant" placeholder="Plant">
<input id="department" placeholder="Department">

<input id="category" placeholder="Category">
<input id="subCategory" placeholder="Sub Category">

<input id="partCode" placeholder="Part Code">
<input id="itemDesc" placeholder="Item Description">

<input id="qty" placeholder="Quantity">
<input id="uom" placeholder="UOM">

<select id="urgency">
  <option value="YELLOW">YELLOW</option>
  <option value="ORANGE">ORANGE</option>
  <option value="RED">RED</option>
</select>

<input id="requiredBy" placeholder="Required By (date)">
<input id="remarks" placeholder="Remarks">

<button onclick="submitPR()">Submit PR</button>

<script>

// 🔴 PASTE YOUR APPS SCRIPT URL HERE
const API_URL = "PASTE_YOUR_WEB_APP_URL_HERE";

// STORE USER
let currentUser = null;

// API CALL FUNCTION
async function apiCall(action, data = {}) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      action,
      ...data
    })
  });

  const json = await res.json();

  if (!json.ok) {
    alert(json.error);
    throw new Error(json.error);
  }

  return json;
}

// LOGIN
async function login() {
  const pin = document.getElementById("pin").value;

  const res = await apiCall("verifyPin", { pin });

  currentUser = res;

  alert("Logged in as " + res.name);
}

// SUBMIT PR
async function submitPR() {

  if (!currentUser) {
    alert("Login first");
    return;
  }

  const data = {
    plant: document.getElementById("plant").value,
    department: document.getElementById("department").value,
    category: document.getElementById("category").value,
    subCategory: document.getElementById("subCategory").value,
    partCode: document.getElementById("partCode").value,
    itemDesc: document.getElementById("itemDesc").value,
    qty: document.getElementById("qty").value,
    uom: document.getElementById("uom").value,
    urgency: document.getElementById("urgency").value,
    requiredBy: document.getElementById("requiredBy").value,
    raisedBy: currentUser.name,
    remarks: document.getElementById("remarks").value
  };

  const res = await apiCall("submitPR", data);

  alert("PR Created: " + res.prNum);
}

</script>

</body>
</html>
